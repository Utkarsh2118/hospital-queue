<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediQueue — Patient Check-in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/foundation.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/kiosk.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" defer></script>
</head>
<body>
  <div class="util-bar">
    <button id="textSizeToggle" class="util-btn util-btn--text" type="button" title="Large text mode" aria-pressed="false">A+</button>
    <button id="themeToggle" class="util-btn" type="button" title="Toggle dark mode" aria-pressed="false"></button>
  </div>

  <div class="kiosk">
    <header class="kiosk__header">
      <span class="kiosk__eyebrow">MediQueue</span>
      <h1 class="kiosk__title">Patient check-in</h1>
    </header>

    <nav class="kiosk__stepper" id="kioskStepper" aria-label="Check-in progress">
      <div class="kiosk__step is-active" data-step="1">
        <span class="kiosk__step-dot">1</span>
        <span class="kiosk__step-label">Department</span>
      </div>
      <span class="kiosk__step-line"><span></span></span>
      <div class="kiosk__step" data-step="2">
        <span class="kiosk__step-dot">2</span>
        <span class="kiosk__step-label">Your details</span>
      </div>
      <span class="kiosk__step-line"><span></span></span>
      <div class="kiosk__step" data-step="3">
        <span class="kiosk__step-dot">3</span>
        <span class="kiosk__step-label">Token</span>
      </div>
    </nav>

    <div id="errorBox" class="kiosk__error hidden"></div>

    <!-- Step 1: Select department -->
    <div id="stepSelectDept" class="kiosk__panel fade-in">
      <p class="kiosk__prompt">Which department would you like to visit today?</p>
      <div id="deptGrid" class="kiosk__dept-grid"></div>
    </div>

    <!-- Step 2: Patient details form -->
    <div id="stepForm" class="kiosk__panel fade-in hidden">
      <button id="backBtn" class="kiosk__back">← Change department</button>
      <p class="kiosk__prompt">
        Checking in to <strong id="selectedDeptName"></strong>
      </p>
      <form id="checkinForm" class="kiosk__form" novalidate>
        <label class="kiosk__field">
          <span>Full name *</span>
          <input type="text" id="patientName" required placeholder="Enter your name" autocomplete="off" />
          <span class="field-error-msg hidden" id="patientNameError"></span>
        </label>
        <div class="kiosk__field-row">
          <label class="kiosk__field">
            <span>Age</span>
            <input type="number" id="patientAge" min="0" max="120" placeholder="Optional" />
            <span class="field-error-msg hidden" id="patientAgeError"></span>
          </label>
          <label class="kiosk__field">
            <span>Phone</span>
            <input type="tel" id="patientPhone" placeholder="10-digit mobile (optional)" inputmode="numeric" pattern="[0-9]*" maxlength="10" autocomplete="off" />
            <span class="field-error-msg hidden" id="patientPhoneError"></span>
          </label>
        </div>
        <label class="kiosk__field">
          <span>Reason for visit</span>
          <textarea id="symptoms" rows="2" placeholder="Briefly describe your symptoms (optional)"></textarea>
        </label>

        <div class="kiosk__priority">
          <button type="button" id="priorityNormal" class="kiosk__priority-btn is-active">
            <span class="kiosk__priority-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6a4 4 0 0 0 8 0V3"/><circle cx="18" cy="16" r="3"/><path d="M14 9v3a4 4 0 0 1-8 0V9"/></svg></span>
            Regular visit
          </button>
          <button type="button" id="priorityEmergency" class="kiosk__priority-btn kiosk__priority-btn--emergency">
            <span class="kiosk__priority-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3Z"/><path d="M12 10v4M12 17.5v.01"/></svg></span>
            This is an emergency
          </button>
        </div>

        <button type="submit" id="submitBtn" class="btn btn--primary btn--lg btn--full">Get my token</button>
      </form>
    </div>

    <!-- Step 3: Ticket issued -->
    <div id="stepTicket" class="kiosk__panel kiosk__panel--center fade-in hidden">
      <p class="kiosk__prompt">You're checked in. Please take a seat and watch the display screen.</p>
      <div id="ticketContainer"></div>
      <div id="trackLinkContainer"></div>
      <div id="liveStatus" class="kiosk__live-status hidden"></div>
      <button id="newCheckinBtn" class="btn btn--secondary btn--lg">Done — new check-in</button>
    </div>
  </div>

  <footer class="kiosk__footer">
    <a href="login.html">Staff login</a>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/kiosk.js"></script>
</body>
</html>
