<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediQueue — Reset your password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/foundation.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login">
    <div class="login__card">
      <span class="login__mark" aria-hidden="true">M</span>
      <span class="login__eyebrow">MediQueue</span>
      <h1 class="login__title">Reset your password</h1>
      <p class="login__subtitle">Enter your staff email and we'll send a link to reset your password.</p>

      <div id="errorBox" class="login__error hidden"></div>
      <div id="infoBox" class="login__info hidden"></div>

      <form id="forgotForm" class="login__form">
        <label class="login__field">
          <span>Email</span>
          <input class="input" type="email" id="email" required placeholder="you@hospital.test" autocomplete="username" />
        </label>
        <button type="submit" id="submitBtn" class="btn btn--primary btn--lg btn--full">Send reset link</button>
      </form>

      <p class="login__back-row">
        <a href="login.html" class="login__forgot-link">← Back to sign in</a>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
