<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediQueue — Choose a new password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/foundation.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login">
    <div class="login__card">
      <span class="login__mark" aria-hidden="true">M</span>
      <span class="login__eyebrow">MediQueue</span>
      <h1 class="login__title">Choose a new password</h1>
      <p class="login__subtitle">This link expires 15 minutes after it was requested.</p>

      <div id="errorBox" class="login__error hidden"></div>
      <div id="infoBox" class="login__info hidden"></div>

      <form id="resetForm" class="login__form">
        <label class="login__field">
          <span>New password</span>
          <div class="password-field-wrap">
            <input class="input" type="password" id="password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password" />
            <button type="button" id="togglePasswordBtn" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <span id="passwordToggleIconSlot"></span>
            </button>
          </div>
        </label>
        <label class="login__field">
          <span>Confirm new password</span>
          <input class="input" type="password" id="passwordConfirm" required minlength="8" placeholder="Re-enter password" autocomplete="new-password" />
        </label>
        <button type="submit" id="submitBtn" class="btn btn--primary btn--lg btn--full">Update password</button>
      </form>

      <p class="login__back-row">
        <a href="login.html" class="login__forgot-link">← Back to sign in</a>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
